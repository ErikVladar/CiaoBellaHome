<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Debug Autoscroll</title>
  <style>
    .carousel-container {
      overflow-x: hidden;
      width: 100%;
      border: 2px solid black;
    }
    .carousel-track {
      display: flex;
      width: max-content;
      will-change: transform;
    }
    .carousel-item {
      min-width: 300px;
      height: 200px;
      margin-right: 16px;
      background: tomato;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
  </style>
</head>
<body>

<div class="carousel-container">
  <div id="carousel" class="carousel-track">
    <div class="carousel-item">1</div>
    <div class="carousel-item">2</div>
    <div class="carousel-item">3</div>
    <div class="carousel-item">4</div>
    <div class="carousel-item">5</div>
    <div class="carousel-item">6</div>
  </div>
</div>

<script>
  const carousel = document.getElementById("carousel");
  let scrollPos = 0;

  function autoScroll() {
    scrollPos += 1;
    if (scrollPos >= carousel.scrollWidth / 2) scrollPos = 0;
    carousel.scrollLeft = scrollPos;
    console.log("Scroll Left:", scrollPos); // 👈 DEBUG LINE
    requestAnimationFrame(autoScroll);
  }

  window.addEventListener("load", () => {
    console.log("Window Loaded");
    console.log("carousel.scrollWidth:", carousel.scrollWidth);
    requestAnimationFrame(autoScroll);
  });
</script>

</body>
</html>
